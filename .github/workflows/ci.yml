name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            votiy-web/pnpm-lock.yaml
            votiy-api/pnpm-lock.yaml
      - run: pnpm --dir votiy-web install --frozen-lockfile
      - run: pnpm --dir votiy-api install --frozen-lockfile
      - run: pnpm --dir votiy-web lint
      - run: pnpm --dir votiy-web build
      - run: node --check votiy-api/server.js
