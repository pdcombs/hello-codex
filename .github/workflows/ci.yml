name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mailpit:
        image: axllent/mailpit:v1.27
        ports: ["1025:1025", "8025:8025"]
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/votiy?replicaSet=rs0
      MONGODB_TEST_URI: mongodb://127.0.0.1:27017/?replicaSet=rs0
      APP_ORIGIN: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v4
      - name: Start MongoDB replica set
        run: |
          docker run -d --name votiy-ci-mongodb -p 27017:27017 mongo:8.0 mongod --replSet rs0 --bind_ip_all
          until docker exec votiy-ci-mongodb mongosh --quiet --eval "db.adminCommand('ping').ok"; do sleep 2; done
          docker exec votiy-ci-mongodb mongosh --quiet --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})"
          until docker exec votiy-ci-mongodb mongosh --quiet --eval "quit(db.adminCommand('hello').isWritablePrimary ? 0 : 1)"; do sleep 2; done
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            votiy-web/pnpm-lock.yaml
            votiy-api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --dir votiy-web install --frozen-lockfile
      - run: pnpm --dir votiy-api install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm --dir votiy-web lint
      - run: pnpm --dir votiy-api test:coverage
      - run: pnpm --dir votiy-web test:coverage
      - run: pnpm --dir votiy-api test:contract
      - run: pnpm --dir votiy-api test:integration
      - name: Verify Add Entries contract and browser coverage
        run: |
          pnpm --dir votiy-api exec vitest run tests/contract/add-entries.contract.test.js
          pnpm --dir votiy-web exec vitest run tests/component/add-entry-modal.test.jsx tests/component/add-entry-owner-choices.test.jsx tests/component/add-entry-owner-search.test.jsx tests/component/add-entry-provisional-owner.test.jsx
      - run: pnpm --dir votiy-web build
      - run: node --check votiy-api/src/server.js
      - run: node --check tests/smoke/production-smoke.js
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e --project=chromium
      - run: pnpm test:e2e --project=mobile-chromium --grep "responsive|public shell"
