name: Post Deploy Smoke

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: read

jobs:
  smoke:
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node tests/smoke/production-smoke.js
        env:
          PRODUCTION_ORIGIN: https://hello-codex-dc65.onrender.com
          PRODUCTION_PUBLIC_EVENT_PATH: ${{ vars.PRODUCTION_PUBLIC_EVENT_PATH }}
          PRODUCTION_EXPECTED_COMMIT: ${{ github.event.workflow_run.head_sha }}
