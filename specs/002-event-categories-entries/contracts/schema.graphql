scalar DateTime

enum ErrorCode {
  AUTHENTICATION_REQUIRED
  EMAIL_NOT_VERIFIED
  FORBIDDEN
  INVALID_CREDENTIALS
  INVALID_OR_EXPIRED_TOKEN
  NOT_FOUND
  RATE_LIMITED
  VALIDATION_FAILED
  CONFLICT
  SERVICE_UNAVAILABLE
}

enum EventRegistrationPolicy { ADMIN_MANAGED OPEN }
enum EventRegistrationStatus { REGISTERED REMOVED }
enum EventRegistrationSource { SELF HOST }

type FieldError { field: String! code: String! message: String! }
type OperationError { code: ErrorCode! message: String! fieldErrors: [FieldError!]! correlationId: String }
type Account { id: ID! displayName: String! email: String! isVerified: Boolean! createdAt: DateTime! }
type SessionPayload { account: Account! }

type EventEntry {
  id: ID!
  title: String!
  categoryId: ID!
  ownerAccountId: ID!
  ownerDisplayName: String!
  createdAt: DateTime!
}

type EventCategory {
  id: ID!
  title: String!
  isDefault: Boolean!
  entries: [EventEntry!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Event {
  id: ID!
  publicId: String!
  title: String!
  description: String
  location: String
  registrationPolicy: EventRegistrationPolicy!
  isOwner: Boolean!
  categories: [EventCategory!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type EventRegistration {
  id: ID!
  accountId: ID!
  email: String
  phone: String
  displayName: String!
  entryCount: Int!
  entries: [EventEntry!]!
  accountCompleted: Boolean!
  status: EventRegistrationStatus!
  source: EventRegistrationSource!
  createdAt: DateTime!
}

type OwnedEventConnection { nodes: [Event!]! nextCursor: String }
type AccountSuccess { account: Account! verificationToken: String }
type SessionSuccess { session: SessionPayload! }
type SignOutSuccess { signedOut: Boolean! }
type EventSuccess { event: Event! }
type EventListSuccess { events: OwnedEventConnection! }
type EventRegistrationSuccess { registration: EventRegistration! }
type EventRegistrationListSuccess { registrations: [EventRegistration!]! }

union AccountResult = AccountSuccess | OperationError
union SessionResult = SessionSuccess | OperationError
union SignOutResult = SignOutSuccess | OperationError
union EventResult = EventSuccess | OperationError
union EventListResult = EventListSuccess | OperationError
union EventRegistrationResult = EventRegistrationSuccess | OperationError
union EventRegistrationListResult = EventRegistrationListSuccess | OperationError

input RegisterInput { displayName: String! email: String! password: String! idempotencyKey: ID! }
input VerifyEmailInput { token: String! }
input SignInInput { email: String! password: String! }
input CreateEventInput {
  title: String!
  description: String
  location: String
  registrationPolicy: EventRegistrationPolicy = ADMIN_MANAGED
  idempotencyKey: ID!
}
input SetEventRegistrationPolicyInput { eventId: ID! registrationPolicy: EventRegistrationPolicy! }
input ParticipantEntryInput { title: String! categoryId: ID! }
input AddEventParticipantInput {
  eventId: ID!
  displayName: String!
  email: String!
  phone: String
  entries: [ParticipantEntryInput!]!
  idempotencyKey: ID!
}
input RegisterForEventInput { eventId: ID! entries: [ParticipantEntryInput!]! idempotencyKey: ID! }
input AddEventCategoryInput { eventId: ID! title: String! idempotencyKey: ID! }
input RenameEventCategoryInput { eventId: ID! categoryId: ID! title: String! idempotencyKey: ID! }
input RemoveEventParticipantInput { eventId: ID! registrationId: ID! }

type Query {
  viewer: SessionResult!
  ownedEvents(first: Int = 20, after: String): EventListResult!
  eventByPublicId(publicId: String!): EventResult!
  eventRegistrations(eventId: ID!): EventRegistrationListResult!
}

type Mutation {
  register(input: RegisterInput!): AccountResult!
  verifyEmail(input: VerifyEmailInput!): SessionResult!
  resendVerification: AccountResult!
  signIn(input: SignInInput!): SessionResult!
  signOut: SignOutResult!
  createEvent(input: CreateEventInput!): EventResult!
  setEventRegistrationPolicy(input: SetEventRegistrationPolicyInput!): EventResult!
  addEventCategory(input: AddEventCategoryInput!): EventResult!
  renameEventCategory(input: RenameEventCategoryInput!): EventResult!
  registerForEvent(input: RegisterForEventInput!): EventRegistrationResult!
  addEventParticipant(input: AddEventParticipantInput!): EventRegistrationResult!
  removeEventParticipant(input: RemoveEventParticipantInput!): EventRegistrationResult!
}
