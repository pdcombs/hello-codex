services:
  - type: web
    name: hello-codex
    runtime: node
    plan: starter
    buildCommand: corepack pnpm --dir hello-world install --frozen-lockfile && corepack pnpm --dir hello-world build && corepack pnpm --dir hello-world-api install --frozen-lockfile
    startCommand: corepack pnpm --dir hello-world-api start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
