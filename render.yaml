services:
  - type: web
    name: hello-codex
    runtime: node
    plan: starter
    buildCommand: corepack pnpm --dir votiy-web install --frozen-lockfile && corepack pnpm --dir votiy-web build && corepack pnpm --dir votiy-api install --frozen-lockfile
    startCommand: corepack pnpm --dir votiy-api start
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: votiy
      - key: APP_ORIGIN
        value: https://hello-codex-dc65.onrender.com
      - key: SESSION_COOKIE_NAME
        value: votiy_session
      - key: SESSION_TTL_SECONDS
        value: 1209600
      - key: VERIFICATION_TTL_SECONDS
        value: 86400
      - key: TOKEN_PEPPER
        generateValue: true
      - key: VOTING_CODE_ENCRYPTION_KEY
        sync: false
      - key: VOTING_P95_BUDGET_MS
        value: 2000
      - key: VOTING_ERROR_RATE_ALERT_PERCENT
        value: 5
      - key: EMAIL_TRANSPORT
        value: fake
      - key: EMAIL_FROM
        value: Votiy <no-reply@votiy.app>
      - key: LOG_LEVEL
        value: info
      - key: EMAIL_PROVIDER_ENDPOINT
        sync: false
      - key: EMAIL_PROVIDER_API_KEY
        sync: false
