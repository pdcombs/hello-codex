services:
  - type: web
    name: hello-codex
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm --dir hello-world install --frozen-lockfile && pnpm --dir hello-world build && pnpm --dir hello-world-api install --frozen-lockfile
    startCommand: pnpm --dir hello-world-api start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
